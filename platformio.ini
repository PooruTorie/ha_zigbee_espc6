; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
[env:seeed_xiao_esp32_c6]
platform = espressif32
framework = arduino
board = seeed_xiao_esp32c6
board_build.partitions = ed.csv

monitor_filters =
    default
    esp32_exception_decoder

extra_scripts = erase_before_upload.py

build_flags =
    -D CORE_DEBUG_LEVEL=5
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

    -D ZIGBEE_MODE_ED

; Depending on the Zigbee mode add this
; -D ZIGBEE_MODE_ZCZR  | Zigbee Coordinator
; -D ZIGBEE_MODE_ED    | End Device
; -D ZIGBEE_MODE_GPD   | Zigbee Green Power Device
; -D ZIGBEE_MODE_RCP   | Zigbee Router/Coordinator Proxy